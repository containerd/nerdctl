# This job runs integration tests directly on the host, with `go test`.
# It covers:
# - windows (w/o canary)
# - docker on linux
# - nerdctl on linux, for all supported variants (rootful, rootless, ipv6, canary, etc.)
# On linux, Docker is only used to build the test dependencies (see the
# `out-test-integration-artifacts` Dockerfile stage), and is disabled before the tests start.
name: job-test-in-host

on:
  workflow_call:
    inputs:
      timeout:
        required: true
        type: number
      runner:
        required: true
        type: string
      canary:
        required: false
        default: false
        type: boolean
      no-hyperv:
        required: false
        default: false
        type: boolean
      # Leave empty for windows and docker. Set to rootful, rootless, or
      # rootless-port-slirp4netns to test nerdctl on a linux host.
      target:
        required: false
        default: ''
        type: string
      binary:
        required: false
        default: nerdctl
        type: string
      containerd-version:
        required: false
        default: ''
        type: string
      rootlesskit-version:
        required: false
        default: ''
        type: string
      ipv6:
        required: false
        default: false
        type: boolean
      skip-flaky:
        required: false
        default: false
        type: boolean
      go-version:
        required: true
        type: string
      docker-version:
        required: false
        default: ''
        type: string
      windows-containerd-version:
        required: false
        default: ''
        type: string
      windows-containerd-sha:
        required: false
        default: ''
        type: string
      windows-cni-version:
        required: false
        default: ''
        type: string

env:
  GOTOOLCHAIN: local

jobs:
  test:
    name: |
      ${{ inputs.binary != 'nerdctl' && format('{0} < ', inputs.binary) || '' }}
      ${{ inputs.target }}
      ${{ contains(inputs.runner, 'ubuntu') && ' linux' || ' windows' }}
      ${{ contains(inputs.runner, 'arm') && '(arm)' || '' }}
      ${{ contains(inputs.runner, '22.04') && '(old ubuntu)' || '' }}
      ${{ inputs.ipv6 && ' (ipv6)' || '' }}
      ${{ inputs.canary && ' (canary)' || '' }}
      ${{ inputs.containerd-version && format(' (ctd: {0})', inputs.containerd-version) || '' }}
      ${{ inputs.rootlesskit-version && format(' (rlk: {0})', inputs.rootlesskit-version) || '' }}
    timeout-minutes: ${{ inputs.timeout }}
    runs-on: "${{ inputs.runner }}"
    defaults:
      run:
        shell: bash

    env:
      SHOULD_RUN: "yes"
      GO_VERSION: ${{ inputs.go-version }}
      # Docker on linux needs rootful. So does nerdctl, unless the target is rootless.
      WITH_SUDO: ${{ contains(inputs.runner, 'ubuntu') && !startsWith(inputs.target, 'rootless') }}
      WINDOWS_CONTAINERD_VERSION: ${{ inputs.windows-containerd-version }}
      WINDOWS_CONTAINERD_SHA: ${{ inputs.windows-containerd-sha }}
      # https://github.com/containerd/nerdctl/issues/622
      # The only case when rootlesskit-version is force-specified is when we downgrade explicitly to v1
      WORKAROUND_ISSUE_622: ${{ inputs.rootlesskit-version }}

    steps:
      - name: "Init: checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: "Init: expose GitHub Runtime variables for gha"
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487  # v4.0.0

      - if: ${{ inputs.no-hyperv }}
        name: "Init (no-hyperv): Disable Hyper-V"
        run: |
          printf "NO_HYPERV=1\n" >> "$GITHUB_ENV"

      - if: ${{ inputs.canary }}
        name: "Init (canary): retrieve latest go and containerd"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUTS_RUNNER: ${{ inputs.runner }}
        run: |
          latest_go="$(. ./hack/provisioning/version/fetch.sh; go::canary::for::go-setup)"
          latest_containerd="$(. ./hack/provisioning/version/fetch.sh; github::project::latest "containerd/containerd")"

          [ "$latest_go" == "" ] || \
            printf "GO_VERSION=%s\n" "$latest_go" >> "$GITHUB_ENV"

          if [[ "${INPUTS_RUNNER}" == *windows* ]]; then
            containerd_version="$WINDOWS_CONTAINERD_VERSION"
            [ "${latest_containerd:1}" == "$containerd_version" ] || {
              printf "WINDOWS_CONTAINERD_VERSION=%s\n" "${latest_containerd:1}" >> "$GITHUB_ENV"
              printf "WINDOWS_CONTAINERD_SHA=canary is volatile and I accept the risk\n" >> "$GITHUB_ENV"
            }
          else
            # On linux, containerd is built from source, as part of the test artifacts
            containerd_version="$(grep -m1 '^ARG CONTAINERD_VERSION=' Dockerfile | cut -d= -f2)"
            containerd_version="${containerd_version%%@*}"
            containerd_version="${containerd_version:1}"
            [ "${latest_containerd:1}" == "$containerd_version" ] || \
              printf "CANARY_CONTAINERD_VERSION=%s\n" "$latest_containerd" >> "$GITHUB_ENV"
            # The golang docker image tag lags behind the golang releases
            latest_go_hub="$(. ./hack/build-integration-canary.sh; canary::golang::hublatest)"
            [ "$latest_go_hub" == "" ] || \
              printf "CANARY_GO_VERSION=%s\n" "$latest_go_hub" >> "$GITHUB_ENV"
          fi
          if [ "$latest_go" == "" ] && [ "${latest_containerd:1}" == "$containerd_version" ]; then
            echo "::warning title=No canary::There is currently no canary versions to test. Steps will not run.";
            printf "SHOULD_RUN=no\n" >> "$GITHUB_ENV"
          fi

      - if: ${{ env.SHOULD_RUN == 'yes' }}
        name: "Init: install go"
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      # XXX RUNNER_OS and generally env is too unreliable
      # - if: ${{ env.RUNNER_OS == 'Linux' }}
      - if: ${{ contains(inputs.runner, 'ubuntu') && env.SHOULD_RUN == 'yes' }}
        name: "Init (linux): register QEMU (tonistiigi/binfmt)"
        run: |
          # `--install all` will only install emulation for architectures that cannot be natively executed
          # Since some arm64 platforms do provide native fallback execution for 32 bits,
          # armv7 emulation may or may not be installed, causing variance in the result of `uname -m`.
          # To avoid that, we explicitly list the architectures we do want emulation for.
          docker run --quiet --privileged --rm tonistiigi/binfmt --install linux/amd64
          docker run --quiet --privileged --rm tonistiigi/binfmt --install linux/arm64
          docker run --quiet --privileged --rm tonistiigi/binfmt --install linux/arm/v7

      - if: ${{ contains(inputs.runner, 'ubuntu') && inputs.target == '' && env.SHOULD_RUN == 'yes' }}
        name: "Init (linux docker): prepare host"
        run: |
          echo "::group:: configure cdi and experimental for docker"
          sudo mkdir -p /etc/docker
          sudo jq -n '.features.cdi = true | .experimental = true' | sudo tee /etc/docker/daemon.json
          echo "::endgroup::"
          echo "::group:: downgrade docker to the specific version we want to test (${INPUTS_DOCKER_VERSION})"
          sudo apt-get update -qq
          sudo apt-get install -qq ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo cp ./hack/provisioning/gpg/docker /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" \
            | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -qq --allow-downgrades docker-ce=${INPUTS_DOCKER_VERSION} docker-ce-cli=${INPUTS_DOCKER_VERSION}
          sudo systemctl restart docker
          echo "::endgroup::"

          # FIXME: remove expect when we are done removing unbuffer from tests
          echo "::group:: installing test dependencies"
          sudo add-apt-repository ppa:criu/ppa -y
          sudo apt-get install -qq expect criu
          echo "::endgroup::"

          # This ensures that bridged traffic goes through netfilter
          sudo modprobe br-netfilter
        env:
          INPUTS_DOCKER_VERSION: ${{ inputs.docker-version }}

      - if: ${{ contains(inputs.runner, 'windows') && env.SHOULD_RUN == 'yes' }}
        name: "Init (windows): prepare host"
        env:
          ctrdVersion: ${{ env.WINDOWS_CONTAINERD_VERSION }}
          ctrdSha: ${{ env.WINDOWS_CONTAINERD_SHA }}
          INPUTS_WINDOWS_CNI_VERSION: ${{ inputs.windows-cni-version }}
        run: |
          # Install WinCNI
          echo "::group:: install wincni"
          GOPATH=$(go env GOPATH) WINCNI_VERSION=${INPUTS_WINDOWS_CNI_VERSION} ./hack/provisioning/windows/cni.sh
          echo "::endgroup::"

          # Install containerd
          echo "::group:: install containerd"
          powershell hack/provisioning/windows/containerd.ps1
          echo "::endgroup::"

          # Install nerdctl
          echo "::group:: build nerctl"
          go install ./cmd/nerdctl
          echo "::endgroup::"

          choco install jq

      # Rootful needs to disable snap
      - if: ${{ inputs.target == 'rootful' && env.SHOULD_RUN == 'yes' }}
        name: "Init (rootful): remove snap loopback devices (conflicts with our loopback devices in TestRunDevice)"
        run: |
          sudo systemctl disable --now snapd.service snapd.socket
          sudo apt-get purge -qq snapd
          sudo losetup -Dv
          sudo losetup -lv

      # ipv6 wants... ipv6
      - if: ${{ inputs.ipv6 && env.SHOULD_RUN == 'yes' }}
        name: "Init (ipv6): enable ipv4 and ipv6 forwarding"
        run: |
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          sudo sysctl -w net.ipv4.ip_forward=1

      - if: ${{ inputs.target != '' && env.SHOULD_RUN == 'yes' }}
        name: "Init (linux): build test artifacts"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUTS_CONTAINERD_VERSION: ${{ inputs.containerd-version }}
          INPUTS_ROOTLESSKIT_VERSION: ${{ inputs.rootlesskit-version }}
        run: |
          buildargs=()
          # Honor if we want old containerd
          [ "${INPUTS_CONTAINERD_VERSION}" == "" ] || buildargs+=(--build-arg CONTAINERD_VERSION=${INPUTS_CONTAINERD_VERSION})
          # Honor if we want old rootlesskit
          [ "${INPUTS_ROOTLESSKIT_VERSION}" == "" ] || buildargs+=(--build-arg ROOTLESSKIT_VERSION=${INPUTS_ROOTLESSKIT_VERSION})
          # Honor canary versions
          [ "${CANARY_CONTAINERD_VERSION:-}" == "" ] || buildargs+=(--build-arg CONTAINERD_VERSION=${CANARY_CONTAINERD_VERSION})
          [ "${CANARY_GO_VERSION:-}" == "" ] || buildargs+=(--build-arg GO_VERSION=${CANARY_GO_VERSION})
          # Cache is sharded per-architecture
          arch=${{ env.RUNNER_ARCH == 'ARM64' && 'arm64' || 'amd64' }}
          docker buildx create --name with-gha --use
          docker buildx build \
            --secret id=github_token,env=GITHUB_TOKEN \
            --cache-from type=gha,scope=test-integration-dependencies-"$arch" \
            --target out-test-integration-artifacts \
            --output type=local,dest=/tmp/nerdctl-test-artifacts \
            "${buildargs[@]}" \
            .

      # Note that Docker cannot be used anymore past this point.
      - if: ${{ inputs.target != '' && env.SHOULD_RUN == 'yes' }}
        name: "Init (linux): provision the host"
        env:
          INPUTS_TARGET: ${{ inputs.target }}
        run: |
          sudo ./hack/provisioning/linux/test-integration-env.sh install /tmp/nerdctl-test-artifacts "${INPUTS_TARGET}"

      - if: ${{ env.SHOULD_RUN == 'yes' }}
        name: "Init: install dev tools"
        run: |
          echo "::group:: make install-dev-tools"
          make install-dev-tools
          [ "$(uname -s)" != "Linux" ] || echo "$HOME/go/bin" >> "$GITHUB_PATH"
          echo "::endgroup::"

      # ipv6 is tested only on linux. For nerdctl, this is done through the ipv6 input instead.
      - if: ${{ contains(inputs.runner, 'ubuntu') && inputs.target == '' && env.SHOULD_RUN == 'yes' }}
        name: "Run (linux): integration tests (IPv6)"
        run: |
          . ./hack/github/action-helpers.sh
          github::md::h2 "ipv6" >> "$GITHUB_STEP_SUMMARY"

          ./hack/test-integration.sh -test.target=${INPUTS_BINARY} -test.only-ipv6
        env:
          INPUTS_BINARY: ${{ inputs.binary }}

      - if: ${{ env.SHOULD_RUN == 'yes' }}
        name: "Run: integration tests"
        run: |
          . ./hack/github/action-helpers.sh
          github::md::h2 "non-flaky" >> "$GITHUB_STEP_SUMMARY"

          args=(-test.target=${INPUTS_BINARY} -test.only-flaky=false)
          [ "${INPUTS_IPV6}" != "true" ] || args+=(-test.only-ipv6)
          [ "${INPUTS_TARGET}" != "rootful" ] || args+=(-test.allow-modify-users=true)
          if [[ "${INPUTS_TARGET}" == rootless* ]]; then
            ./hack/test-integration-rootless.sh ./hack/test-integration.sh "${args[@]}"
          else
            ./hack/test-integration.sh "${args[@]}"
          fi
        env:
          INPUTS_BINARY: ${{ inputs.binary }}
          INPUTS_TARGET: ${{ inputs.target }}
          INPUTS_IPV6: ${{ inputs.ipv6 }}
          CONTAINERD_ROOTLESS_ROOTLESSKIT_PORT_DRIVER: ${{ inputs.target == 'rootless-port-slirp4netns' && 'slirp4netns' || '' }}

      # FIXME: this must go
      - if: ${{ env.SHOULD_RUN == 'yes' && !fromJSON(inputs.skip-flaky) }}
        name: "Run: integration tests (flaky)"
        run: |
          . ./hack/github/action-helpers.sh
          github::md::h2 "flaky" >> "$GITHUB_STEP_SUMMARY"

          args=(-test.target=${INPUTS_BINARY} -test.only-flaky=true)
          [ "${INPUTS_IPV6}" != "true" ] || args+=(-test.only-ipv6)
          if [[ "${INPUTS_TARGET}" == rootless* ]]; then
            ./hack/test-integration-rootless.sh ./hack/test-integration.sh "${args[@]}"
          else
            ./hack/test-integration.sh "${args[@]}"
          fi
        env:
          INPUTS_BINARY: ${{ inputs.binary }}
          INPUTS_TARGET: ${{ inputs.target }}
          INPUTS_IPV6: ${{ inputs.ipv6 }}
          CONTAINERD_ROOTLESS_ROOTLESSKIT_PORT_DRIVER: ${{ inputs.target == 'rootless-port-slirp4netns' && 'slirp4netns' || '' }}
