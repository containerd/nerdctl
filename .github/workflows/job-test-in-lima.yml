# Currently, Lima job test only for EL, though in the future it could be used to also test FreeBSD or other linux-es
# The test artifacts are built on the host with Docker, then installed inside the guest VM,
# where the integration tests run directly with `go test` (no Docker inside the VM).
name: job-test-in-lima

on:
  workflow_call:
    inputs:
      timeout:
        required: true
        type: number
      runner:
        required: true
        type: string
      target:
        required: true
        type: string
      guest:
        required: true
        type: string
      go-version:
        required: true
        type: string
      skip-flaky:
        required: false
        default: false
        type: boolean

jobs:
  test:
    name: "${{ inputs.guest }} ${{ inputs.target }}"
    timeout-minutes: ${{ inputs.timeout }}
    runs-on: "${{ inputs.runner }}"
    env:
      TARGET: ${{ inputs.target }}
      GUEST: ${{ inputs.guest }}
      GO_VERSION: ${{ inputs.go-version }}
    steps:
      - name: "Init: checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: "Init: lima"
        uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5  # v1.1.0
        id: lima-actions-setup

      - name: "Init: Cache"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-actions-setup.outputs.version }}

      - name: "Init: expose GitHub Runtime variables for gha"
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487  # v4.0.0

      - name: "Init: start the guest VM"
        run: |
          set -eux
          limactl start \
            --name=default \
            --cpus=4 \
            --memory=12 \
            --containerd=none \
            --set '.mounts=null' \
            template://${GUEST}

      - name: "Init: build test artifacts (on the host, with Docker)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          docker buildx create --name with-gha --use
          docker buildx build \
            --secret id=github_token,env=GITHUB_TOKEN \
            --cache-from type=gha,scope=test-integration-dependencies-amd64 \
            --target out-test-integration-artifacts \
            --output type=local,dest=/tmp/nerdctl-test-artifacts \
            .

      - name: "Init: copy source and artifacts into the guest VM"
        run: |
          set -eux
          lima bash -c 'command -v tar' || lima sudo dnf install -q -y tar
          tar -cf- . | lima bash -c 'mkdir -p ~/nerdctl && tar -xf- -C ~/nerdctl'
          tar -cf- -C /tmp/nerdctl-test-artifacts . | lima bash -c 'mkdir -p ~/nerdctl-test-artifacts && tar -xf- -C ~/nerdctl-test-artifacts'

      - name: "Init: install go in the guest VM"
        run: |
          set -eux
          gover="$(curl -fsSL --proto '=https' --tlsv1.2 'https://go.dev/dl/?mode=json&include=all' | jq -r --arg prefix "go${GO_VERSION}." '[.[].version | select(startswith($prefix))] | first')"
          [ "$gover" != "null" ]
          curl -fsSL --proto '=https' --tlsv1.2 "https://go.dev/dl/${gover}.linux-amd64.tar.gz" | lima sudo tar -xzf- -C /usr/local

      - name: "Init: provision the guest VM"
        run: |
          set -eux
          lima bash -c 'cd ~/nerdctl && sudo ./hack/provisioning/linux/test-integration-env.sh install ~/nerdctl-test-artifacts "$0"' "$TARGET"

      - name: "Init: install dev tools in the guest VM"
        run: |
          set -eux
          lima bash -c 'export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH" && cd ~/nerdctl && make install-dev-tools'

      - name: "Run: integration tests"
        run: |
          set -eux
          if [ "$TARGET" = "rootless" ]; then
            lima bash -c 'export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH" && cd ~/nerdctl && ./hack/test-integration-rootless.sh ./hack/test-integration.sh -test.only-flaky=false'
          else
            lima bash -c 'export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH" WITH_SUDO=true && cd ~/nerdctl && ./hack/test-integration.sh -test.only-flaky=false'
          fi

      - name: "Run: integration tests (flaky)"
        if: ${{ !fromJSON(inputs.skip-flaky) }}
        run: |
          set -eux
          if [ "$TARGET" = "rootless" ]; then
            lima bash -c 'export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH" && cd ~/nerdctl && ./hack/test-integration-rootless.sh ./hack/test-integration.sh -test.only-flaky=true'
          else
            lima bash -c 'export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH" WITH_SUDO=true && cd ~/nerdctl && ./hack/test-integration.sh -test.only-flaky=true'
          fi
